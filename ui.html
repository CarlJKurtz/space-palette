<!DOCTYPE html>
<html>

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", sans-serif;
      background: #2c2c2c;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .palette {
      display: flex;
      gap: 6px;
      padding: 15px;
    }

    button {
      background: #2c2c2c;
      color: #cccccc;
      border: 2px solid #3a3a3a;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 11px;
      font-family: "Inter", sans-serif;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    button:hover {
      background: #3a3a3a;
      color: #ffffff;
      border-color: #555555;
    }

    button.copied {
      background: #1a3d2b;
      color: #4caf7d;
      border-color: #4caf7d;
    }

    .btn-label {
      font-size: 10px;
      opacity: 0.6;
      letter-spacing: 0.03em;
    }

    .btn-preview {
      font-size: 12px;
      letter-spacing: 0;
      line-height: 1;
    }
  </style>
</head>

<body>
  <div class="palette" id="palette"></div>

  <script>
    const spaces = [
      { label: "Hair", char: "\u200A", unicode: "U+200A" },
      { label: "Sixth", char: "\u2006", unicode: "U+2006" },
      { label: "Thin", char: "\u2009", unicode: "U+2009" },
      { label: "Quarter", char: "\u2005", unicode: "U+2005" },
      { label: "Third", char: "\u2004", unicode: "U+2004" },
      { label: "En", char: "\u2002", unicode: "U+2002" },
      { label: "Em", char: "\u2003", unicode: "U+2003" },
      { label: "No-break", char: "\u00A0", unicode: "U+00A0" },
    ];

    const palette = document.getElementById("palette");

    spaces.forEach(({ label, char, unicode }) => {
      const btn = document.createElement("button");
      btn.title = unicode;

      const preview = document.createElement("span");
      preview.className = "btn-preview";
      preview.textContent = "an" + char + "no";

      const lbl = document.createElement("span");
      lbl.className = "btn-label";
      lbl.textContent = label;

      btn.appendChild(preview);
      btn.appendChild(lbl);

      btn.addEventListener("click", () => {
        const ta = document.createElement("textarea");
        ta.value = char;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);

        btn.classList.add("copied");
        setTimeout(() => btn.classList.remove("copied"), 800);

        parent.postMessage({ pluginMessage: { type: "copied", label: `${label} Space` } }, "*");
      });

      palette.appendChild(btn);
    });

    requestAnimationFrame(() => {
      const { width: paletteWidth } = palette.getBoundingClientRect();
      const bodyPadding = 20;
      const width = Math.ceil(paletteWidth) + bodyPadding;
      parent.postMessage({ pluginMessage: { type: "resize", width, height: 72 } }, "*");
    });
  </script>
</body>

</html>
